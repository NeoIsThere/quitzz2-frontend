<div class="advice-container">
  <a routerLink="/" class="back-link">
    <i class="pi pi-arrow-left"></i> Back
  </a>

  <h1 class="advice-heading">You've got this.</h1>
  <p class="advice-subheading">The urge is temporary. Try one of these right now:</p>

  <div class="advice-grid">
    @for (card of adviceCards; track card.title) {
      <div class="advice-card">
        <div class="advice-icon">{{ card.icon }}</div>
        <h3 class="advice-title">{{ card.title }}</h3>
        <p class="advice-description">{{ card.description }}</p>
      </div>
    }
  </div>
</div>
