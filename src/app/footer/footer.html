<footer class="footer-container">
  @if (!isAuthPage) {
    <div class="footer-actions">
      <a class="footer-donate-btn" href="https://www.paypal.com/donate/?hosted_button_id=69AS3ZARCBM7Q" target="_blank" rel="noopener">
        <i class="pi pi-heart-fill"></i>
        <span>Donate</span>
      </a>
      <button class="footer-feedback-btn" (click)="toggleFeedback()">
        <i class="pi pi-comment"></i>
        <span>Feedback</span>
      </button>
    </div>

    @if (showFeedback) {
      <div class="feedback-panel">
        <textarea
          class="feedback-textarea"
          [(ngModel)]="feedbackText"
          placeholder="Tell us what you think…"
          maxlength="2000"
          rows="4"
        ></textarea>
        <div class="feedback-actions">
          <span class="feedback-char-count">{{ feedbackText.length }}/2000</span>
          <button
            class="feedback-send-btn"
            [disabled]="feedbackText.trim().length === 0 || sendingFeedback"
            (click)="submitFeedback()"
          >
            {{ sendingFeedback ? 'Sending…' : 'Send' }}
          </button>
        </div>
        @if (feedbackSuccess) {
          <p class="feedback-msg success">Thanks for your feedback!</p>
        }
        @if (feedbackError) {
          <p class="feedback-msg error">Something went wrong. Please try again.</p>
        }
      </div>
    }
  }

  <div class="footer-legal">
    <a routerLink="/privacy" class="footer-legal-link">Privacy Policy</a>
    <span class="footer-legal-sep">·</span>
    <a routerLink="/terms" class="footer-legal-link">Terms of Service</a>
  </div>
  <span class="footer-text">Unbreaker 2026 v1.0.0</span>
</footer>
